# Phase 6.5 — validation gate: predeploy, migrate deploy (ephemeral DB), tests, frontend build.
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: posflyt_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    # Ephemeral Postgres credentials — CI only. Never reuse for staging/production.
    # See backend/docs/DEPLOYMENT_ENVIRONMENT_RULES.md §12 and backend/.env.ci.example
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/posflyt_test?schema=public
      JWT_SECRET: ci-test-jwt-secret-not-for-production-min-16
      NODE_ENV: test
      # Phase 6.3 — migration validation tier (deploy-only); must match prisma-env-policy staging rules
      MIGRATION_ENV: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install
        run: npm ci
      - name: CI env guard (blocks misconfigured production CI)
        run: node scripts/ci-env-guard.js
      - name: Predeploy checks (schema validate — same gate as start:prod)
        run: npm run predeploy
      - name: Prisma migrate (test database)
        run: node scripts/prisma-safety-check.js prisma migrate deploy
      - name: Unit tests
        run: npm test
      - name: Integration tests
        run: npm run test:integration

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
