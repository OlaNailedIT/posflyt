name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-unit:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: posflyt_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d posflyt_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/posflyt_ci?schema=public
      JWT_SECRET: ci-test-secret
      NODE_ENV: test
      PORT: 4000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Prepare database schema
        run: npx prisma db push --skip-generate
      - name: Run backend unit tests
        run: npm test

  backend-integration:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    needs: backend-unit
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: posflyt_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d posflyt_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/posflyt_ci?schema=public
      JWT_SECRET: ci-test-secret
      NODE_ENV: test
      PORT: 4000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Prepare database schema
        run: npx prisma db push --skip-generate
      - name: Run backend integration tests
        run: npm run test:integration

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: backend-integration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build

  smoke-tests:
    name: Browser Smoke Tests
    runs-on: ubuntu-latest
    needs: frontend-build
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: posflyt_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d posflyt_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/posflyt_ci?schema=public
      JWT_SECRET: ci-test-secret
      NODE_ENV: test
      PORT: 4000
      VITE_API_BASE_URL: http://127.0.0.1:4000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Install backend dependencies
        run: npm ci
        working-directory: backend
      - name: Prepare database schema
        run: npx prisma db push --skip-generate
        working-directory: backend
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run browser smoke tests
        run: npm run test:e2e:smoke
