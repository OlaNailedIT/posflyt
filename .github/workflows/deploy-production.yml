# Phase 6.5 — manual production promotion (environment approval) + optional rollback hook.
#
# Deploy path enforces (see docs/PRODUCTION_GO_NO_GO.md):
# - At least one successful "CI" workflow run for this commit (same SHA).
# - At least one release-style git tag on this commit (e.g. v1.0-rc.0, v1.0-rc, or vYYYY.MM.DD-N).
# Tag the commit before running this workflow; the hook receives that tag name (not an auto-generated tag).
#
# Rollback does not require CI/tag gates.
name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      action:
        description: "deploy or rollback"
        required: true
        type: choice
        options:
          - deploy
          - rollback
      target_release:
        description: "Release tag for rollback (required when action=rollback)"
        required: false
        type: string

concurrency:
  group: posflyt-production-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  deploy:
    name: Promote to Production
    if: ${{ github.event.inputs.action == 'deploy' }}
    runs-on: ubuntu-latest
    environment: production
    outputs:
      release_tag: ${{ steps.release.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify successful CI for this commit
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.request("GET /repos/{owner}/{repo}/actions/runs", {
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: context.sha,
              status: "completed",
              per_page: 30,
            });
            const ciRuns = data.workflow_runs.filter((r) => r.name === "CI");
            if (ciRuns.length === 0) {
              core.setFailed(
                "No completed CI workflow runs found for this commit. Wait for CI to finish on this SHA before production deploy."
              );
              return;
            }
            const ok = ciRuns.some((r) => r.conclusion === "success");
            if (!ok) {
              const summary = ciRuns.map((r) => `${r.conclusion}`).join(", ");
              core.setFailed(
                `No successful CI run for this commit. Completed CI conclusions: ${summary}`
              );
              return;
            }
            core.info("CI gate: PASS (at least one successful CI run for this commit).");

      - name: Verify release tag on commit
        id: release
        run: |
          set -euo pipefail
          TAGS=$(git tag --points-at "$GITHUB_SHA" || true)
          if [ -z "${TAGS// }" ]; then
            echo "ERROR: This commit has no git tags."
            echo "Tag it first (e.g. git tag v1.0.0-rc.1 $GITHUB_SHA && git push origin v1.0.0-rc.1)."
            exit 1
          fi
          echo "Tags at commit:"
          echo "$TAGS"
          ALLOW=0
          FIRST=""
          while IFS= read -r t; do
            [ -z "$t" ] && continue
            if [[ "$t" =~ ^v1\.0-rc ]] || [[ "$t" =~ ^v1\.0\.0-rc ]] || [[ "$t" =~ ^v[0-9]{4}\. ]] || [[ "$t" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
              ALLOW=1
              FIRST="${FIRST:-$t}"
            fi
          done <<< "$(printf '%s\n' "$TAGS")"
          if [ "$ALLOW" -ne 1 ] || [ -z "${FIRST:-}" ]; then
            echo "ERROR: No allowed release tag found."
            echo "Allowed examples: v1.0-rc* / v1.0.0-rc* / v1.2.3 / v2026.04.15-1"
            exit 1
          fi
          echo "release_tag=$FIRST" >> "$GITHUB_OUTPUT"

      - name: Promote known-good staging artifact/image
        env:
          PRODUCTION_DEPLOY_HOOK_URL: ${{ secrets.PRODUCTION_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$PRODUCTION_DEPLOY_HOOK_URL" ]; then
            echo "PRODUCTION_DEPLOY_HOOK_URL is required."
            exit 1
          fi
          curl -fsS -X POST "$PRODUCTION_DEPLOY_HOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"release\":\"${{ steps.release.outputs.release_tag }}\",\"source\":\"staging\"}"

      - name: Verify production health checks
        env:
          PRODUCTION_API_HEALTH_URL: ${{ secrets.PRODUCTION_API_HEALTH_URL }}
          PRODUCTION_SYSTEM_HEALTH_URL: ${{ secrets.PRODUCTION_SYSTEM_HEALTH_URL }}
        run: |
          if [ -z "$PRODUCTION_API_HEALTH_URL" ] || [ -z "$PRODUCTION_SYSTEM_HEALTH_URL" ]; then
            echo "Production health URLs are required."
            exit 1
          fi
          curl -fsS "$PRODUCTION_API_HEALTH_URL"
          curl -fsS "$PRODUCTION_SYSTEM_HEALTH_URL"

  rollback:
    name: Rollback Production
    if: ${{ github.event.inputs.action == 'rollback' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Validate rollback input
        run: |
          if [ -z "${{ github.event.inputs.target_release }}" ]; then
            echo "target_release is required for rollback."
            exit 1
          fi

      - name: Trigger rollback hook
        env:
          PRODUCTION_ROLLBACK_HOOK_URL: ${{ secrets.PRODUCTION_ROLLBACK_HOOK_URL }}
        run: |
          if [ -z "$PRODUCTION_ROLLBACK_HOOK_URL" ]; then
            echo "PRODUCTION_ROLLBACK_HOOK_URL is required."
            exit 1
          fi
          curl -fsS -X POST "$PRODUCTION_ROLLBACK_HOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"release\":\"${{ github.event.inputs.target_release }}\"}"
