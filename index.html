<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d9488" />
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
    <link rel="dns-prefetch" href="https://www.google-analytics.com" />
    <meta
      name="description"
      content="POSflyt — offline-first POS and inventory for retailers. Real-time dashboards, sync, and simple pricing for SMBs."
    />
    <title>POSflyt — POS &amp; Inventory for Modern Retail</title>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("posflyt-theme");
          if (raw) {
            var data = JSON.parse(raw);
            var t = data.state && data.state.theme;
            if (t === "dark") document.documentElement.classList.add("dark");
            return;
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
